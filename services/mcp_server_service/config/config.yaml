mcp_server:
  host: "0.0.0.0"
  port: 8020
  log_level: "INFO"
  tool_name: "retrieve_context"

embeddings:
  # Dense — Google text-embedding-004 (matches "Google Embeddings" in architecture)
  dense:
    provider: "google"
    model: "models/text-embedding-004"
    dimension: 768
    task_type: "RETRIEVAL_DOCUMENT"   # used at ingestion time
    query_task_type: "RETRIEVAL_QUERY"

  # Sparse — BM42 via FastEmbed (fast, no GPU required)
  sparse:
    provider: "fastembed"
    model: "Qdrant/bm42-all-minilm-l6-v2-attentions"

qdrant:
  url: "http://qdrant:6333"
  collection_name: "rag_documents"
  dense_vector_name: "dense"
  sparse_vector_name: "sparse"
  # api_key loaded from QDRANT_API_KEY env var

retrieval:
  top_k_dense: 20          # candidates from dense search before reranking
  top_k_sparse: 20         # candidates from sparse search before reranking
  top_k_final: 5           # final results returned after reranking
  score_fusion: "rrf"      # reciprocal rank fusion | weighted
  rrf_k: 60                # RRF constant

reranker:
  enabled: true
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  device: "cpu"            # change to "cuda" if GPU available
  max_length: 512